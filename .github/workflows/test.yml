name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm

      - name: Check RLS on all tables
        run: bash scripts/check-rls.sh

      - name: Install dependencies
        run: npm ci

      # Build every package (incl. the Next.js web app) so a type error or
      # broken build fails on PR instead of at deploy time on the NAS.
      # Placeholder public Supabase vars let the client-page prerender construct
      # its browser client; no network calls happen at build time.
      - name: Build all packages
        run: npm run build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Lint
        run: npm run lint

      - name: Run unit tests
        run: npm test

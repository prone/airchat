# Publishes the `airchat` npm package when a GitHub release is created.
#
# Auth: OIDC trusted publisher (configured on npmjs.com).
# The trusted publisher on npmjs.com must match:
#   - Repository: prone/airchat
#   - Workflow: publish.yml
#   - Environment: (blank)
#
# Package publishing access must be set to:
#   "Require two-factor authentication and disallow tokens (recommended)"
#
# IMPORTANT: Do NOT set an NPM_TOKEN secret — it overrides OIDC and breaks
# publishing. The actions/setup-node registry-url config auto-injects
# NODE_AUTH_TOKEN from secrets, which conflicts with provenance-based auth.

name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # The published bundle folds in @airchat/cli + @airchat/shared via esbuild,
      # so we need a full workspace install and a turbo build (which builds those
      # deps first), not an isolated build in the package directory.
      - name: Install dependencies
        run: npm ci

      - name: Build (bundles the CLI + shared into a self-contained package)
        run: npx turbo build --filter=airchat

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/create-airchat

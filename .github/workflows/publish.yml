name: Publish to npm

on:
  release:
    types: [published]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm install
        working-directory: packages/create-airchat

      - name: Build
        run: npx tsc
        working-directory: packages/create-airchat

      - name: Publish
        run: npm publish --provenance --access public
        working-directory: packages/create-airchat

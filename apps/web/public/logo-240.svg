<svg xmlns="http://www.w3.org/2000/svg" width="240" height="240" viewBox="0 0 240 240">
  <rect width="240" height="240" rx="48" fill="#0a0a0a"/>

  <!-- Chat bubble body -->
  <rect x="48" y="56" width="144" height="96" rx="16" fill="#3b82f6"/>
  <!-- Chat bubble tail -->
  <polygon points="72,152 88,152 72,176" fill="#3b82f6"/>

  <!-- Cursor/caret lines (terminal-style, representing agent text) -->
  <rect x="72" y="80" width="56" height="4" rx="2" fill="#0a0a0a" opacity="0.7"/>
  <rect x="72" y="96" width="96" height="4" rx="2" fill="#0a0a0a" opacity="0.7"/>
  <rect x="72" y="112" width="72" height="4" rx="2" fill="#0a0a0a" opacity="0.7"/>
  <rect x="72" y="128" width="8" height="4" rx="2" fill="#e5e5e5"/>

  <!-- "AirChat" text -->
  <text x="120" y="210" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="22" font-weight="700" fill="#e5e5e5" letter-spacing="1">AirChat</text>
</svg>
